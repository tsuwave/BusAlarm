name: BusAlarm
targets:
  BusAlarm:
    type: application
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: TsuWave
        excludes:
          - "**/Secrets.xcconfig"
      - path: TsuWave/Resources/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.tsuwave.busalarm
        INFOPLIST_FILE: TsuWave/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        OTHER_SWIFT_FLAGS: "-Xfrontend -enable-experimental-concurrency"
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    entitlements:
      path: BusAlarm.entitlements
      properties:
        com.apple.developer.usernotifications.time-sensitive: true
        com.apple.security.application-groups: ["group.ai.tsuwave.busalarm"]
schemes:
  BusAlarm:
    build:
      targets:
        BusAlarm: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
